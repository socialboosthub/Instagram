<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram Downloader</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1f2937;
      padding: 30px;
      border-radius: 12px;
      width: 400px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      margin-bottom: 15px;
    }

    button {
      background: #e1306c;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.9;
    }

    #result {
      margin-top: 20px;
    }

    a {
      color: #60a5fa;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Instagram Downloader</h2>

  <input
    type="text"
    id="url"
    placeholder="Paste Instagram URL"
  />

  <button onclick="downloadMedia()">Download</button>

  <div id="result"></div>
</div>

<script>
  async function downloadMedia() {
    const url = document.getElementById("url").value;
    const result = document.getElementById("result");

    result.innerHTML = "Loading...";

    try {
      const response = await fetch("/download", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ url })
      });

      const data = await response.json();

      if (!data.success) {
        result.innerHTML = "Failed to fetch media";
        return;
      }

      const media =
        data.result.data?.[0]?.url ||
        data.result.result?.[0]?.url;

      if (!media) {
        result.innerHTML = "No media found";
        return;
      }

      result.innerHTML = `
        <p>Download Ready:</p>
        <a href="${media}" target="_blank">Click Here</a>
      `;
    } catch (err) {
      result.innerHTML = "Error occurred";
    }
  }
</script>

</body>
</html>
