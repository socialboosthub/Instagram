<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Downloader</title>  <style>
    body{
      font-family: Arial;
      background:#111827;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      background:#1f2937;
      padding:25px;
      border-radius:10px;
      width:350px;
      text-align:center;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
    }

    button{
      margin-top:15px;
      padding:12px 20px;
      background:#e1306c;
      border:none;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }

    a{
      color:#60a5fa;
      display:block;
      margin-top:15px;
    }
  </style></head>
<body><div class="box">
  <h2>Instagram Downloader</h2>  <input type="text" id="url" placeholder="Paste Instagram URL"><button onclick="download()">Download</button>

  <div id="result"></div>
</div><script>
async function download() {

  const url = document.getElementById("url").value;
  const result = document.getElementById("result");

  result.innerHTML = "Loading...";

  try {

    const res = await fetch("/api/download", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({ url })
    });

    const data = await res.json();

    if(!data.success){
      result.innerHTML = "Failed";
      return;
    }

    const media =
      data.data.data?.[0]?.url ||
      data.data.result?.[0]?.url;

    if(!media){
      result.innerHTML = "No media found";
      return;
    }

    result.innerHTML = `
      <a href="${media}" target="_blank">Download Media</a>
    `;

  } catch(err){
    result.innerHTML = "Error";
  }
}
</script></body>
</html>
